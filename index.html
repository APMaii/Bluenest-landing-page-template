<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BlueNest — Smart Property Analysis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,700;0,9..144,900;1,9..144,700;1,9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --white:   #FFFFFF;
  --page-bg: #ffffff;
  --surface: #ffffff;
  --off:     #F4F7FC;
  --off2:    #E9EEF6;
  --ink:     #0C2744;
  --muted:   #5A6B82;
  --border:  #D2DCE8;
  --blue:    #1458B8;
  --blue2:   #1E6FD4;
  --orange:  #E07015;
  --orange2: #F08528;
  --gold:    #C9941C;
  --sand:    #E8EDF5;
  --navy:    #061A33;
}

/* Dark mode — deep blue surfaces (--page-bg: canvas; --white stays #fff for text on navy & buttons) */
[data-theme="dark"] {
  color-scheme: dark;
  --page-bg: #0a1528;
  --white:   #ffffff;
  --surface: #152a45;
  --off:     #0d1a30;
  --off2:    #1a3352;
  --ink:     #eef3fb;
  --muted:   #b4c8de;
  --muted-soft: #9db1c9;
  --border:  #28456b;
  --blue:    #5aa8ff;
  --blue2:   #7eb8ff;
  --orange:  #f0a04a;
  --orange2: #ffb35c;
  --gold:    #e8c45c;
  --sand:    #1a2f4d;
  --navy:    #050b16;
  --text-on-navy: #f2f6fc;
}

html { scroll-behavior: smooth; }
body {
  font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
  background: var(--page-bg);
  color: var(--ink);
  overflow-x: hidden;
  cursor: auto;
}
/* scroll progress */
.scroll-progress {
  position: fixed; top: 0; left: 0; height: 2px; z-index: 100000;
  width: 0%;
  background: linear-gradient(90deg, var(--blue), var(--gold));
  pointer-events: none;
  transition: width .12s ease-out;
}
::-webkit-scrollbar { width: 2px; }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--blue), var(--gold)); border-radius: 2px; }
a { text-decoration: none; color: inherit; }

/* ══════════════════════════════════════
   NAVBAR
══════════════════════════════════════ */
.nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 500;
  display: flex; align-items: center; justify-content: space-between;
  padding: 1.1rem 5%;
  transition: all .45s cubic-bezier(.4,0,.2,1);
}
.nav.solid {
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(24px) saturate(1.2);
  -webkit-backdrop-filter: blur(24px) saturate(1.2);
  border-bottom: 1px solid rgba(210, 220, 232, .65);
  box-shadow: 0 8px 32px rgba(6, 26, 51, .04);
}
.logo {
  display: flex; align-items: center;
  cursor: pointer;
  line-height: 0;
}
.logo-img {
  height: 34px;
  width: auto;
  display: block;
  object-fit: contain;
}
@media (max-width: 480px) {
  .logo-img { height: 28px; }
}
.logo-dot { color: var(--gold); }
.nav-links {
  display: flex; align-items: center; gap: .15rem;
}
.nav-links a {
  padding: .45rem 1rem;
  font-size: .82rem; font-weight: 500; letter-spacing: -.01em;
  color: var(--muted); cursor: pointer;
  border-radius: 6px;
  transition: all .2s;
}
.nav-links a:hover { color: var(--ink); background: rgba(20, 88, 184, .06); }
.nav-right { display: flex; align-items: center; gap: .7rem; }
.btn-nav-ghost {
  padding: .48rem 1.1rem;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .82rem; font-weight: 600; color: var(--muted);
  cursor: pointer; transition: color .2s; border-radius: 8px;
}
.btn-nav-ghost:hover { color: var(--ink); }
.btn-nav-fill {
  display: inline-flex; align-items: center; gap: .45rem;
  padding: .5rem 1.2rem;
  background: var(--blue); color: var(--white);
  border-radius: 8px; font-size: .82rem; font-weight: 700;
  letter-spacing: -.01em; cursor: pointer;
  font-family: 'Plus Jakarta Sans', sans-serif;
  transition: all .25s;
  box-shadow: 0 1px 3px rgba(20, 88, 184, .2), 0 4px 14px rgba(20, 88, 184, .12);
}
.btn-nav-fill:hover {
  background: var(--orange);
  box-shadow: 0 6px 20px rgba(224, 112, 21, .35);
  transform: translateY(-1px);
}
.btn-nav-fill svg { transition: transform .2s; }
.btn-nav-fill:hover svg { transform: translateX(2px); }
.ham {
  display: none; flex-direction: column; gap: 5px;
  background: none; border: none; cursor: pointer; padding: .4rem;
}
.ham span { display: block; width: 22px; height: 1.5px; background: var(--blue); border-radius: 2px; transition: all .3s; }

/* theme toggle */
.theme-toggle {
  display: inline-flex; align-items: center; justify-content: center;
  width: 40px; height: 40px;
  flex-shrink: 0;
  padding: 0; border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--off);
  color: var(--ink);
  cursor: pointer;
  transition: background .2s, border-color .2s, color .2s, transform .2s;
}
.theme-toggle:hover {
  background: var(--sand);
  border-color: rgba(20, 88, 184, .28);
  color: var(--blue);
}
.theme-toggle svg { width: 18px; height: 18px; }
[data-theme="dark"] .theme-toggle {
  background: rgba(74, 158, 255, .1);
  border-color: var(--border);
  color: var(--gold);
}
[data-theme="dark"] .theme-toggle:hover {
  background: rgba(74, 158, 255, .18);
  border-color: rgba(74, 158, 255, .45);
  color: #fff;
}
[data-theme="dark"] .nav.solid {
  background: rgba(10, 21, 40, .88);
  border-bottom-color: var(--border);
  box-shadow: 0 8px 32px rgba(0, 0, 0, .35);
}
[data-theme="dark"] .logo-img {
  filter: brightness(0) invert(1);
  opacity: 0.92;
}
[data-theme="dark"] .hero-mesh {
  background:
    radial-gradient(ellipse 90% 60% at 15% -5%, rgba(74, 158, 255, .14) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 95% 15%, rgba(228, 188, 74, .07) 0%, transparent 50%),
    radial-gradient(ellipse 60% 45% at 40% 105%, rgba(74, 158, 255, .08) 0%, transparent 45%);
}
[data-theme="dark"] .hero-fade {
  background: linear-gradient(to bottom, transparent, var(--page-bg));
}
[data-theme="dark"] .hero-wash {
  opacity: 0;
}
[data-theme="dark"] .hero-dotgrid {
  opacity: .2;
  mix-blend-mode: normal;
}
[data-theme="dark"] .hero-eyebrow {
  background: rgba(21, 42, 69, 0.88);
  border-color: var(--border);
  box-shadow: 0 2px 24px rgba(0, 0, 0, 0.35);
}
[data-theme="dark"] .eyebrow-pip {
  background: rgba(90, 168, 255, 0.14);
}
[data-theme="dark"] .hero-pill {
  background: rgba(21, 42, 69, 0.78);
  border-color: var(--border);
}
[data-theme="dark"] .hero-pill:hover {
  border-color: rgba(90, 168, 255, 0.38);
  box-shadow: 0 4px 22px rgba(0, 0, 0, 0.35);
}
[data-theme="dark"] .hero-h1 .light-word {
  color: rgba(238, 243, 251, 0.42);
}
[data-theme="dark"] .hero-gif-frame {
  background:
    linear-gradient(180deg, var(--off) 0%, var(--surface) 100%) padding-box,
    linear-gradient(135deg, rgba(90, 168, 255, .38), rgba(232, 196, 92, .2)) border-box;
  box-shadow:
    0 0 0 1px rgba(40, 69, 107, 0.75) inset,
    0 24px 80px rgba(0, 0, 0, 0.4),
    0 4px 24px rgba(20, 88, 184, 0.12);
}
[data-theme="dark"] .hero-gif-wrap:hover .hero-gif-frame {
  box-shadow:
    0 0 0 1px rgba(74, 158, 255, 0.28) inset,
    0 32px 100px rgba(0, 0, 0, 0.45),
    0 8px 32px rgba(20, 88, 184, 0.15);
}
[data-theme="dark"] .gif-topbar {
  background: rgba(13, 26, 48, 0.94);
  border-bottom-color: var(--border);
}
[data-theme="dark"] .gif-ph-icon {
  background: var(--surface);
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.35);
}
[data-theme="dark"] .gif-ph-label {
  color: rgba(238, 243, 251, 0.38);
}
[data-theme="dark"] .gif-float {
  background: rgba(21, 42, 69, 0.94);
  border-color: var(--border);
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
}
[data-theme="dark"] .logos-strip {
  background: linear-gradient(180deg, var(--page-bg) 0%, var(--surface) 42%, var(--page-bg) 100%);
}
[data-theme="dark"] .logos-track span {
  color: rgba(238, 243, 251, 0.22);
}
[data-theme="dark"] .logos-track span:hover {
  color: rgba(238, 243, 251, 0.52);
}
[data-theme="dark"] .s-h2 em,
[data-theme="dark"] .feat-copy h2 em {
  color: rgba(238, 243, 251, 0.42);
}
[data-theme="dark"] .feat-index {
  color: rgba(90, 168, 255, 0.45);
}
[data-theme="dark"] .feat-bullet {
  color: var(--muted);
}
[data-theme="dark"] .feat-media-ph {
  color: rgba(238, 243, 251, 0.28);
}
[data-theme="dark"] .wc-num {
  color: rgba(238, 243, 251, 0.38);
}
[data-theme="dark"] .feat-media-badge {
  background: rgba(21, 42, 69, 0.92);
  border-color: var(--border);
}
[data-theme="dark"] .p-feat {
  color: var(--muted);
}
[data-theme="dark"] .testi-track-wrap::before {
  background: linear-gradient(90deg, var(--page-bg), transparent);
}
[data-theme="dark"] .testi-track-wrap::after {
  background: linear-gradient(-90deg, var(--page-bg), transparent);
}
[data-theme="dark"] .hero-b3 {
  opacity: 0.22;
  mix-blend-mode: soft-light;
  filter: saturate(0.95);
}
[data-theme="dark"] .testi-card {
  background: linear-gradient(165deg, rgba(18,34,56,.95) 0%, var(--off) 100%);
}
[data-theme="dark"] .p-card {
  background: var(--off2);
  border-color: var(--border);
}
[data-theme="dark"] .p-card.featured {
  background: linear-gradient(145deg, #0c1829 0%, #0a1424 100%);
  border-color: #1a3558;
}
[data-theme="dark"] .mob-overlay {
  background: rgba(8, 16, 32, .97);
  backdrop-filter: blur(24px);
}
[data-theme="dark"] .f-logo-img {
  filter: brightness(0) invert(1);
  opacity: 0.65;
}
[data-theme="dark"] .f-logo:hover .f-logo-img { opacity: 0.9; }

/* ══════════════════════════════════════
   HERO
══════════════════════════════════════ */
.hero {
  min-height: 100vh;
  padding: 7.5rem 5% 0;
  position: relative;
  overflow: hidden;
  background: var(--page-bg);
  display: flex; flex-direction: column;
}

.hero-mesh {
  position: absolute; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 90% 60% at 15% -5%, rgba(20, 88, 184, .14) 0%, transparent 55%),
    radial-gradient(ellipse 70% 50% at 95% 15%, rgba(201, 148, 28, .09) 0%, transparent 50%),
    radial-gradient(ellipse 60% 45% at 40% 105%, rgba(20, 88, 184, .07) 0%, transparent 45%);
  animation: meshPulse 22s ease-in-out infinite alternate;
}

/* b3.png — atmospheric art layer (place b3.png next to index.html) */
.hero-b3 {
  position: absolute;
  z-index: 1;
  pointer-events: none;
  user-select: none;
  top: -4%;
  right: max(-6%, -2.5rem);
  width: clamp(260px, 52vw, 680px);
  height: auto;
  opacity: 0.42;
  mix-blend-mode: multiply;
  filter: saturate(1.05);
  mask-image: radial-gradient(ellipse 75% 75% at 60% 45%, #000 20%, transparent 72%);
  -webkit-mask-image: radial-gradient(ellipse 75% 75% at 60% 45%, #000 20%, transparent 72%);
}
@media (max-width: 900px) {
  .hero-b3 {
    top: 2%;
    right: -12%;
    width: min(78vw, 420px);
    opacity: 0.28;
  }
}
@media (prefers-reduced-motion: reduce) {
  .hero-b3 { opacity: 0.32; }
}
@keyframes meshPulse {
  0% { opacity: 1; filter: saturate(1); }
  100% { opacity: .92; filter: saturate(1.08); }
}

/* SVG dot-grid background */
.hero-dotgrid {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  opacity: .35;
  mix-blend-mode: multiply;
}

.hero-wash {
  position: absolute; top: -80px; left: 50%; transform: translateX(-50%);
  width: min(100vw, 1000px); height: 520px;
  background: radial-gradient(ellipse, rgba(255,255,255,.5) 0%, transparent 70%);
  pointer-events: none; z-index: 2;
}
.hero-fade {
  position: absolute; bottom: 0; left: 0; right: 0; height: 180px;
  background: linear-gradient(to bottom, transparent, var(--page-bg));
  pointer-events: none; z-index: 3;
}

.hero-inner {
  position: relative; z-index: 4;
  max-width: 1360px; margin: 0 auto; width: 100%;
  display: flex; flex-direction: column;
  align-items: center;
  text-align: center;
}

.hero-eyebrow {
  display: inline-flex; align-items: center; gap: .55rem;
  padding: .4rem 1rem .4rem .6rem;
  background: rgba(255,255,255,.72);
  border: 1px solid var(--border);
  border-radius: 50px;
  font-size: .7rem; font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 1.5rem;
  font-family: 'DM Mono', monospace;
  animation: fadeUp .6s ease both;
  backdrop-filter: blur(10px);
  box-shadow: 0 2px 20px rgba(6, 26, 51, .04);
}
.eyebrow-pip {
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(20, 88, 184, .12);
  display: flex; align-items: center; justify-content: center;
}
.eyebrow-pip::after {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold); animation: pip 2s ease-in-out infinite;
}
/* Smart Property Analysis — spaced wordmark in eyebrow */
.spa-brand {
  letter-spacing: .2em;
  font-weight: 700;
  color: var(--ink);
}
@keyframes pip { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(1.5)} }

.hero-h1 {
  font-family: 'Fraunces', serif;
  font-size: clamp(3.2rem, 7vw, 5.25rem);
  font-weight: 900; line-height: .98; letter-spacing: -.04em;
  color: var(--ink);
  margin-bottom: 1.5rem;
  max-width: 900px;
  margin-left: auto; margin-right: auto;
  animation: fadeUp .7s .08s ease both;
}
.hero-h1 .hero-line { display: block; }
.hero-h1 .hero-gradient {
  display: block;
  margin-top: .1em;
  background: linear-gradient(105deg, var(--ink) 0%, var(--blue) 42%, var(--gold) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  font-style: italic;
  font-weight: 800;
}
.hero-h1 .italic-accent {
  font-style: italic; color: var(--blue);
  font-weight: 700;
}
.hero-h1 .light-word {
  font-weight: 300; color: rgba(12, 39, 68, .42);
}

.hero-lead {
  font-size: clamp(1.02rem, 1.4vw, 1.15rem);
  line-height: 1.75;
  color: var(--muted); font-weight: 450;
  max-width: 32rem;
  margin: 0 auto 2rem;
  animation: fadeUp .7s .14s ease both;
}

.hero-metrics-pills {
  display: flex; flex-wrap: wrap; gap: .55rem;
  justify-content: center;
  margin: 0 auto 2.5rem;
  animation: fadeUp .75s .28s ease both;
}
.hero-pill {
  display: inline-flex; align-items: baseline; gap: .35rem;
  padding: .48rem 1rem;
  font-size: .74rem; font-weight: 500;
  color: var(--muted);
  background: rgba(255,255,255,.88);
  border: 1px solid rgba(210, 220, 232, .95);
  border-radius: 999px;
  backdrop-filter: blur(10px);
  transition: border-color .25s, box-shadow .25s;
}
.hero-pill:hover {
  border-color: rgba(20, 88, 184, .28);
  box-shadow: 0 4px 20px rgba(20, 88, 184, .08);
}
.hero-pill strong {
  font-family: 'Fraunces', serif;
  font-weight: 800;
  font-size: .82rem;
  color: var(--ink);
  letter-spacing: -.03em;
}
.hero-pill span { font-size: .72rem; letter-spacing: .01em; }

.hero-ctas {
  display: flex; align-items: center; gap: .75rem;
  flex-wrap: wrap; justify-content: center;
  margin-bottom: 1.25rem;
  animation: fadeUp .7s .2s ease both;
}
.btn-primary {
  display: inline-flex; align-items: center; gap: .55rem;
  padding: .8rem 1.8rem;
  background: var(--blue); color: var(--white);
  border-radius: 10px; font-size: .9rem; font-weight: 700;
  letter-spacing: -.02em; cursor: pointer;
  transition: all .3s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 2px 0 rgba(15, 60, 130, .35), 0 8px 24px rgba(20, 88, 184, .2);
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.btn-primary:hover {
  background: var(--gold);
  box-shadow: 0 2px 0 rgba(140, 100, 20, .35), 0 10px 32px rgba(201, 148, 28, .35);
  transform: translateY(-2px);
}
.btn-primary svg { transition: transform .2s; }
.btn-primary:hover svg { transform: translateX(3px); }
.btn-secondary {
  display: inline-flex; align-items: center; gap: .5rem;
  padding: .8rem 1.6rem;
  background: var(--off); color: var(--ink);
  border: 1px solid var(--border); border-radius: 10px;
  font-size: .9rem; font-weight: 600; cursor: pointer;
  transition: all .25s; letter-spacing: -.01em;
  font-family: 'Plus Jakarta Sans', sans-serif;
}
.btn-secondary:hover { background: var(--sand); border-color: rgba(20, 88, 184, .22); }

/* ── HERO INTERACTIVE WORKFLOW ── */
.hero-gif-wrap {
  width: 100%; max-width: 1280px;
  margin: 0 auto;
  position: relative;
  animation: fadeUp .9s .32s ease both;
}
.hero-workflow {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(160px, 220px);
  gap: 1.25rem 1rem;
  align-items: stretch;
  width: 100%;
}
.hero-workflow-main {
  min-width: 0;
  display: flex;
  flex-direction: column;
  position: relative;
}
.hero-workflow-side {
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: .65rem;
  align-self: center;
  max-width: 210px;
  width: 100%;
  margin-right: clamp(0.75rem, 2.5vw, 2.25rem);
  padding: .7rem .75rem;
  background: var(--off);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: .74rem;
  line-height: 1.5;
  color: var(--muted);
  text-align: left;
  transition: border-color .3s ease, box-shadow .3s ease, transform .25s ease;
}
.hero-workflow-side:hover {
  border-color: rgba(20, 88, 184, .2);
  box-shadow: 0 8px 28px rgba(6, 26, 51, .06);
}
[data-theme="dark"] .hero-workflow-side:hover {
  border-color: rgba(90, 168, 255, .2);
  box-shadow: 0 8px 28px rgba(0, 0, 0, .25);
}
.hero-workflow-side strong { color: var(--ink); font-weight: 600; }
.hero-wf-side-title {
  font-family: 'Fraunces', serif;
  font-size: .92rem;
  font-weight: 700;
  letter-spacing: -.02em;
  color: var(--ink);
  line-height: 1.2;
}
.hero-wf-intro-hint {
  font-size: .68rem;
  line-height: 1.55;
}
.hero-wf-progress {
  height: 3px;
  border-radius: 2px;
  background: var(--border);
  overflow: hidden;
  margin: .35rem 0 .15rem;
}
.hero-wf-progress-fill {
  height: 100%;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--blue), var(--gold));
  transition: width .12s linear;
}
.hero-wf-progress-label {
  font-family: 'DM Mono', monospace;
  font-size: .55rem;
  letter-spacing: .08em;
  text-transform: uppercase;
  color: var(--muted);
  opacity: .85;
}
.hero-wf-steps {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: .4rem;
  margin: 0;
  padding: 0;
}
.hero-wf-step {
  display: flex;
  gap: .5rem;
  align-items: flex-start;
  padding: .45rem .5rem;
  border-radius: 8px;
  border: 1px solid transparent;
  transition: background .2s, border-color .2s, box-shadow .2s, transform .2s;
}
button.hero-wf-step {
  width: 100%;
  margin: 0;
  font: inherit;
  color: inherit;
  text-align: left;
  cursor: pointer;
  background: transparent;
  -webkit-appearance: none;
  appearance: none;
}
.hero-wf-step:hover:not(.active) {
  background: rgba(20, 88, 184, .04);
  border-color: rgba(20, 88, 184, .1);
  transform: translateX(2px);
}
[data-theme="dark"] .hero-wf-step:hover:not(.active) {
  background: rgba(90, 168, 255, .06);
  border-color: rgba(90, 168, 255, .12);
}
.hero-wf-step:focus-visible {
  outline: 2px solid var(--blue);
  outline-offset: 2px;
}
.hero-wf-step-num {
  flex-shrink: 0;
  width: 20px; height: 20px;
  border-radius: 5px;
  background: var(--sand);
  border: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: .52rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--muted);
  transition: transform .2s;
}
.hero-wf-step:hover .hero-wf-step-num { transform: scale(1.05); }
.hero-wf-step.active {
  background: rgba(20, 88, 184, .07);
  border-color: rgba(20, 88, 184, .18);
  box-shadow: 0 4px 16px rgba(20, 88, 184, .08);
}
[data-theme="dark"] .hero-wf-step.active {
  background: rgba(90, 168, 255, .1);
  border-color: rgba(90, 168, 255, .22);
}
.hero-wf-step.active .hero-wf-step-num {
  background: var(--blue);
  color: var(--white);
  border-color: var(--blue);
}
.hero-wf-step-title {
  font-weight: 700;
  font-size: .68rem;
  color: var(--ink);
  margin-bottom: .08rem;
}
.hero-wf-step-desc {
  font-size: .62rem;
  color: var(--muted);
  line-height: 1.4;
}
.hero-wf-cma-ready {
  font-family: 'Fraunces', serif;
  font-size: 1.05rem;
  font-weight: 800;
  letter-spacing: -.03em;
  color: var(--ink);
  line-height: 1.15;
}
.hero-wf-cma-sub {
  font-size: .65rem;
  color: var(--muted);
  line-height: 1.5;
}
.hero-wf-open-link {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  margin-top: .25rem;
  font-size: .65rem;
  font-weight: 600;
  color: var(--blue);
}
.hero-wf-open-link:hover { text-decoration: underline; }
.hero-wf-skip {
  display: inline-block;
  margin-top: .5rem;
  padding: 0;
  border: none;
  background: none;
  font-family: 'DM Mono', monospace;
  font-size: .58rem;
  letter-spacing: .06em;
  text-transform: uppercase;
  color: var(--blue);
  cursor: pointer;
  opacity: .85;
  transition: opacity .2s;
}
.hero-wf-skip:hover { opacity: 1; text-decoration: underline; }
@keyframes heroWfPulse {
  0%, 100% { box-shadow: 0 8px 28px rgba(6, 26, 51, .15), 0 0 0 0 rgba(20, 88, 184, .35); }
  50% { box-shadow: 0 10px 32px rgba(20, 88, 184, .22), 0 0 0 6px rgba(20, 88, 184, .08); }
}
.hero-wf-media {
  position: relative;
}
.hero-wf-media img,
.hero-wf-media video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.hero-wf-hit {
  position: absolute;
  left: 50%;
  bottom: 12%;
  transform: translateX(-50%);
  display: inline-flex;
  align-items: center;
  gap: .5rem;
  padding: .72rem 1.35rem .72rem 1.05rem;
  background: rgba(255,255,255,.94);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: .9rem;
  font-weight: 700;
  color: var(--ink);
  cursor: pointer;
  box-shadow: 0 8px 28px rgba(6, 26, 51, .15);
  transition: transform .2s, box-shadow .2s;
  animation: heroWfPulse 2.4s ease-in-out infinite;
}
.hero-wf-hit:hover {
  transform: translateX(-50%) translateY(-2px);
  box-shadow: 0 12px 36px rgba(20, 88, 184, .25);
  animation: none;
}
.hero-wf-hit svg { flex-shrink: 0; color: var(--blue); }
[data-theme="dark"] .hero-wf-hit {
  background: rgba(21, 42, 69, 0.95);
  border-color: var(--border);
  color: var(--ink);
}
.hero-mini-browser--embed {
  flex: 1;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: var(--off2);
}
.hero-mini-browser--embed .gif-topbar {
  flex-shrink: 0;
}
.hero-wf-iframe-wrap {
  flex: 1;
  min-height: min(58vh, 600px);
  position: relative;
  background: var(--page-bg);
}
.hero-mini-browser--embed .hero-wf-iframe-wrap {
  min-height: min(56vh, 600px);
}
.hero-wf-iframe-wrap iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
}
.hero-workflow .hero-gif-frame {
  display: flex;
  flex-direction: column;
  min-height: min(68vh, 720px);
}
.hero-workflow .gif-media {
  flex: 1;
  min-height: 0;
  position: relative;
  display: block;
}
.hero-workflow .gif-media > .hero-wf-media {
  position: absolute;
  inset: 0;
}
[data-theme="dark"] .hero-workflow-side {
  background: rgba(21, 42, 69, 0.55);
}
@media (max-width: 900px) {
  .hero-workflow {
    grid-template-columns: 1fr;
  }
  .hero-workflow-side {
    order: -1;
    max-width: none;
    margin-right: 0;
  }
  .hero-wf-iframe-wrap { min-height: min(50vh, 480px); }
}
@media (prefers-reduced-motion: reduce) {
  .hero-wf-hit { animation: none; }
}
/* corner pin decorations */
.gif-corner {
  position: absolute; width: 18px; height: 18px; z-index: 4;
  color: var(--border);
}
.gif-corner svg { width: 100%; height: 100%; }
.gif-corner.tl { top: -1px; left: -1px; }
.gif-corner.tr { top: -1px; right: -1px; transform: scaleX(-1); }
.gif-corner.bl { bottom: -1px; left: -1px; transform: scaleY(-1); }
.gif-corner.br { bottom: -1px; right: -1px; transform: scale(-1); }

.hero-gif-frame {
  width: 100%;
  border-radius: 20px 20px 0 0;
  border: 1px solid transparent;
  overflow: hidden;
  background:
    linear-gradient(180deg, var(--off) 0%, var(--white) 100%) padding-box,
    linear-gradient(135deg, rgba(20, 88, 184, .4), rgba(201, 148, 28, .22)) border-box;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.65) inset,
    0 24px 80px rgba(6, 26, 51, .1),
    0 4px 24px rgba(20, 88, 184, .06);
  position: relative;
  transition: box-shadow .45s ease, transform .45s ease;
}
.hero-gif-wrap:hover .hero-gif-frame {
  box-shadow:
    0 0 0 1px rgba(255,255,255,.75) inset,
    0 32px 100px rgba(6, 26, 51, .12),
    0 8px 32px rgba(20, 88, 184, .1);
  transform: translateY(-3px);
}
/* browser-style topbar */
.gif-topbar {
  display: flex; align-items: center; gap: .7rem;
  padding: .9rem 1.2rem;
  background: rgba(255,255,255,.7);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(8px);
}
.gif-dots { display: flex; gap: .4rem; }
.gif-dot { width: 10px; height: 10px; border-radius: 50%; }
.gif-dot-r { background: #1458B8; }
.gif-dot-y { background: #C9941C; }
.gif-dot-g { background: #E07015; }
.gif-urlbar {
  flex: 1; background: var(--off); border: 1px solid var(--border);
  border-radius: 6px; padding: .28rem 1rem;
  font-family: 'DM Mono', monospace; font-size: .7rem;
  color: var(--muted); text-align: center;
  display: flex; align-items: center; justify-content: center; gap: .4rem;
}
.gif-urlbar::before {
  content: '';
  width: 10px; height: 10px;
  background: url("data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' stroke='%23888' stroke-width='2' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z'/%3E%3C/svg%3E") center/contain no-repeat;
  flex-shrink: 0;
}
.gif-status {
  display: flex; align-items: center; gap: .4rem;
  font-family: 'DM Mono', monospace; font-size: .7rem; color: var(--muted);
}
.gif-status-dot { width: 6px; height: 6px; border-radius: 50%; background: #C9941C; animation: pip 2s infinite; }

.gif-media {
  aspect-ratio: 16/9;
  background: var(--off2);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; position: relative;
}
.gif-media img { width: 100%; height: 100%; object-fit: cover; display: block; }

/* placeholder state */
.gif-ph {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 1.4rem; width: 100%; height: 100%; min-height: 440px;
}
.gif-ph-icon {
  width: 72px; height: 72px;
  background: var(--white); border: 1px solid var(--border);
  border-radius: 18px; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(0,0,0,.06);
}
.gif-ph-label {
  font-family: 'DM Mono', monospace; font-size: .8rem;
  color: rgba(0,0,0,.2); letter-spacing: .06em;
}
/* float overlays on gif */
.gif-float {
  position: absolute; z-index: 5;
  background: rgba(255,255,255,.9);
  backdrop-filter: blur(12px);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: .75rem 1rem;
  box-shadow: 0 8px 32px rgba(0,0,0,.1);
  font-size: .8rem;
  animation: floatY 5s ease-in-out infinite;
}
.gif-float-1 { bottom: 1.8rem; left: 1.8rem; animation-delay: 0s; }
.gif-float-2 { bottom: 1.8rem; right: 1.8rem; animation-delay: 1.8s; }
.gif-float-3 { top: 1.8rem; right: 1.8rem; animation-delay: .9s; }
@keyframes floatY { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.gif-float-inner { display: flex; align-items: center; gap: .55rem; }
.gif-float-badge {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.gif-float-badge.blue { background: var(--blue); box-shadow: 0 0 6px rgba(20, 88, 184, .45); }
.gif-float-badge.orange { background: var(--orange); box-shadow: 0 0 6px rgba(224, 112, 21, .45); }
.gif-float-title { font-weight: 700; color: var(--ink); font-family: 'Plus Jakarta Sans', sans-serif; }
.gif-float-sub { font-size: .72rem; color: var(--muted); margin-top: .1rem; }

/* ══════════════════════════════════════
   LOGOS
══════════════════════════════════════ */
.logos-strip {
  padding: 1.65rem 0;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, var(--off) 0%, var(--white) 45%, var(--off) 100%);
  overflow: hidden;
}
.logos-strip-inner {
  max-width: 1240px; margin: 0 auto; padding: 0 5%;
  display: flex; align-items: center; gap: 1.75rem;
  flex-wrap: wrap;
}
.logos-label {
  flex-shrink: 0; font-family: 'DM Mono', monospace;
  font-size: .62rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--muted);
}
.logos-marquee { flex: 1; min-width: 0; overflow: hidden;
  mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
}
.logos-track {
  display: flex; align-items: center; gap: 3.25rem;
  width: max-content;
  animation: logosMarquee 38s linear infinite;
}
.logos-track:hover { animation-play-state: paused; }
@keyframes logosMarquee {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
.logos-track span {
  font-family: 'Fraunces', serif; font-size: .9rem; font-weight: 700;
  color: rgba(12, 39, 68, .2); letter-spacing: -.02em;
  white-space: nowrap; cursor: default;
  transition: color .3s ease;
}
.logos-track span:hover { color: rgba(12, 39, 68, .45); }

/* ══════════════════════════════════════
   SECTION BASE
══════════════════════════════════════ */
.section { padding: 6.5rem 5%; }
.s-inner { max-width: 1100px; margin: 0 auto; }
.s-tag {
  display: inline-flex; align-items: center; gap: .5rem;
  font-family: 'DM Mono', monospace;
  font-size: .68rem; letter-spacing: .12em; text-transform: uppercase;
  color: var(--blue); margin-bottom: 1rem;
}
.s-tag::before { content: '→'; font-size: .75rem; }
.s-h2 {
  font-family: 'Fraunces', serif;
  font-size: clamp(2.2rem, 4vw, 3.4rem);
  font-weight: 900; letter-spacing: -.04em; line-height: 1.06;
  color: var(--ink); margin-bottom: 1rem;
}
.s-h2 em { font-style: italic; color: rgba(12, 39, 68, .32); }
.s-sub {
  font-size: 1rem; line-height: 1.8; color: var(--muted);
  font-weight: 400; max-width: 480px;
}

/* ══════════════════════════════════════
   FEATURE SLIDE (grid)
══════════════════════════════════════ */
.feat-inner {
  max-width: 1220px; margin: 0 auto;
  display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.22fr);
  gap: 3rem 4.5rem; align-items: center;
}
.feat-inner.rev { direction: rtl; }
.feat-inner.rev > * { direction: ltr; }
.feat-copy .s-tag { margin-bottom: .85rem; }
.feat-index {
  display: block;
  font-family: 'DM Mono', monospace;
  font-size: .68rem;
  letter-spacing: .28em;
  color: rgba(20, 88, 184, .35);
  margin-bottom: .65rem;
  font-weight: 500;
}
.feat-copy h2 {
  font-family: 'Fraunces', serif;
  font-size: clamp(2rem, 3.5vw, 2.9rem);
  font-weight: 900; letter-spacing: -.04em; line-height: 1.06;
  color: var(--ink); margin-bottom: 1rem;
}
.feat-copy h2 em { font-style: italic; color: rgba(12, 39, 68, .32); }
.feat-copy p {
  font-size: .97rem; line-height: 1.8; color: var(--muted);
  margin-bottom: 1.6rem; font-weight: 400;
}
.feat-bullets { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 2rem; }
.feat-bullet {
  display: flex; align-items: flex-start; gap: .7rem;
  font-size: .88rem; color: rgba(12, 39, 68, .72); line-height: 1.55;
}
.fb-icon {
  flex-shrink: 0; margin-top: .25rem;
  width: 16px; height: 16px;
}
.feat-link {
  display: inline-flex; align-items: center; gap: .5rem;
  font-size: .85rem; font-weight: 700; color: var(--ink);
  cursor: pointer; transition: all .2s;
  font-family: 'Plus Jakarta Sans', sans-serif;
  position: relative;
}
.feat-link::after {
  content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
  height: 1px; background: var(--ink); transform: scaleX(.4);
  transform-origin: left; transition: transform .25s;
}
.feat-link:hover { color: var(--blue); }
.feat-link:hover::after { background: var(--blue); transform: scaleX(1); }
.feat-link svg { transition: transform .2s; }
.feat-link:hover svg { transform: translateX(3px); }

/* media — larger preview for gifs / screenshots */
.feat-media {
  border-radius: 18px; overflow: hidden;
  border: 1px solid var(--border);
  background: var(--off);
  width: 100%;
  aspect-ratio: 16 / 10;
  min-height: 420px;
  position: relative;
  box-shadow: 0 6px 12px rgba(0,0,0,.05), 0 28px 72px rgba(0,0,0,.09);
  display: flex; align-items: center; justify-content: center;
}
.feat-media img {
  width: 100%; height: 100%;
  object-fit: cover;
  object-position: center top;
}
.feat-media-ph {
  display: flex; flex-direction: column; align-items: center; gap: .7rem;
  color: rgba(0,0,0,.15);
}
.feat-media-ph-ico { font-size: 4rem; }
.feat-media-ph span {
  font-family: 'DM Mono', monospace; font-size: .72rem;
  letter-spacing: .06em;
}
.feat-media-badge {
  position: absolute; top: .9rem; left: .9rem;
  background: rgba(255,255,255,.88);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  border-radius: 6px; padding: .28rem .7rem;
  font-family: 'DM Mono', monospace; font-size: .65rem;
  color: var(--muted); letter-spacing: .07em; text-transform: uppercase;
  z-index: 2;
}
/* subtle orange corner gradient on hover */
.feat-media::after {
  content: ''; position: absolute; inset: 0; pointer-events: none;
  background: linear-gradient(135deg, rgba(20, 88, 184, .07) 0%, rgba(201, 148, 28, .04) 45%, transparent 60%);
}

/* ══════════════════════════════════════
   FEATURE RAIL (horizontal scroll on vertical scroll)
══════════════════════════════════════ */
.feat-rail-spacer {
  position: relative;
  height: 400vh;
  --feat-rail-p: 0;
  --rail-panels: 8;
  --rail-pairs: 4;
  /* Measured from .feat-rail-viewport — fixes alignment vs 100vw / % bugs */
  --rail-vw: 100vw;
}
.feat-rail-sticky {
  position: sticky;
  top: 0;
  min-height: 100vh;
  height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow: hidden;
  padding: 3.25rem 0 3.75rem;
  box-sizing: border-box;
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(20, 88, 184, .06) 0%, transparent 55%),
    linear-gradient(180deg, var(--sand) 0%, var(--white) 35%, var(--white) 100%);
}
[data-theme="dark"] .feat-rail-sticky {
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(74, 130, 220, .08) 0%, transparent 55%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg) 100%);
}
.feat-rail-head {
  max-width: 1100px;
  margin: 0 auto;
  padding: 0 clamp(1rem, 4vw, 2.5rem);
  width: 100%;
  flex-shrink: 0;
  margin-bottom: 1rem;
}
.feat-rail-kicker {
  font-family: 'DM Mono', monospace;
  font-size: .65rem;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--blue);
  margin-bottom: .45rem;
}
.feat-rail-title {
  font-family: 'Fraunces', serif;
  font-size: clamp(1.05rem, 1.65vw, 1.4rem);
  font-weight: 600;
  letter-spacing: -.02em;
  color: var(--ink);
  line-height: 1.45;
  max-width: 38rem;
  opacity: .92;
}
.feat-rail-title em {
  font-style: italic;
  font-weight: 700;
  color: var(--blue);
}
[data-theme="dark"] .feat-rail-title em { color: rgba(130, 180, 255, .95); }
.feat-rail-viewport {
  position: relative;
  width: 100%;
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: stretch;
  padding: 0 clamp(.5rem, 2vw, 1.25rem);
  box-sizing: border-box;
}
/* Track: 4× viewport width = 8 half-columns; transform uses pixel-accurate --rail-vw */
.feat-rail-track {
  display: flex;
  height: 100%;
  gap: 0;
  width: calc(var(--rail-pairs, 4) * var(--rail-vw, 100vw));
  will-change: transform;
  backface-visibility: hidden;
  transform: translate3d(
    calc(-1 * var(--feat-rail-p, 0) * (var(--rail-pairs, 4) - 1) * var(--rail-vw, 100vw)),
    0,
    0
  );
}
.feat-rail-panel {
  flex: 0 0 calc(var(--rail-vw, 100vw) / 2);
  width: calc(var(--rail-vw, 100vw) / 2);
  min-width: 0;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  box-sizing: border-box;
  padding: 0 clamp(.35rem, 1vw, .65rem);
}
.feat-rail-half-inner {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 0;
  padding: 0;
}
.feat-rail-half-inner--copy {
  align-items: center;
}
/* Shared square frame — media + copy use identical size (fixes tiny video in tall viewport) */
.feat-rail-square {
  --rail-sz: min(
    calc(var(--rail-vw, 100vw) / 2 - 1.25rem),
    min(68vmin, min(70vh, 560px))
  );
  width: var(--rail-sz);
  height: var(--rail-sz);
  max-width: 100%;
  flex-shrink: 0;
  border-radius: 22px;
  box-sizing: border-box;
  overflow: hidden;
}
.feat-rail-square--media {
  box-shadow:
    0 0 0 1px rgba(255, 255, 255, .1),
    0 12px 40px rgba(12, 39, 68, .22);
}
.feat-rail-square--copy {
  box-shadow: 0 8px 32px rgba(12, 39, 68, .08);
}
/* Phone-style preview — fills the square */
.feat-rail-phone {
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.feat-rail-phone-chrome {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 0;
  flex: 1;
  display: flex;
  flex-direction: column;
  border-radius: inherit;
  padding: 8px 8px 10px;
  box-sizing: border-box;
  background: linear-gradient(165deg, #152a45 0%, #0a1628 42%, #060d18 100%);
}
.feat-rail-phone-badge {
  display: block;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: .55rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(255, 255, 255, .45);
  padding: .35rem .5rem .65rem;
}
.feat-rail-phone-screen {
  position: relative;
  flex: 1;
  min-height: 0;
  border-radius: 16px;
  overflow: hidden;
  background: #0c1424;
}
.feat-rail-phone-screen::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  border-radius: inherit;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, .06);
}
.feat-rail-phone-screen img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center top;
  display: block;
}
.feat-rail-phone .feat-media-ph {
  height: 100%;
  min-height: 200px;
  color: rgba(255, 255, 255, .2);
}
/* Copy card — same outer square as media */
.feat-rail-square--copy .feat-rail-copy-card {
  width: 100%;
  height: 100%;
  max-height: none;
  border-radius: inherit;
  overflow-x: hidden;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}
.feat-rail-copy-card {
  width: 100%;
  height: 100%;
  padding: clamp(.85rem, 1.6vw, 1.35rem) clamp(.9rem, 1.5vw, 1.25rem);
  box-sizing: border-box;
  background: linear-gradient(180deg, #ffffff 0%, #f3f6fa 100%);
  border: 1px solid rgba(12, 39, 68, .08);
  scrollbar-width: thin;
}
[data-theme="dark"] .feat-rail-copy-card {
  background: linear-gradient(180deg, rgba(28, 38, 52, .98) 0%, rgba(22, 30, 42, .99) 100%);
  border-color: rgba(255, 255, 255, .1);
  box-shadow: 0 8px 40px rgba(0, 0, 0, .35);
}
.feat-rail-copy-meta {
  display: flex;
  align-items: baseline;
  gap: .5rem;
  margin-bottom: .65rem;
  flex-wrap: wrap;
}
.feat-rail-copy-meta .feat-index {
  margin-bottom: 0;
}
.feat-rail-copy-card .feat-copy .s-tag {
  margin-bottom: 0;
}
.feat-rail-copy-card .feat-copy .s-tag::before { content: none; }
.feat-rail-copy-card .feat-copy h2 {
  font-size: clamp(1.15rem, 2.1vw, 1.95rem);
  margin-bottom: .65rem;
  line-height: 1.08;
  color: var(--blue);
}
.feat-rail-copy-card .feat-copy h2 em {
  color: rgba(12, 39, 68, .35);
  font-style: italic;
}
[data-theme="dark"] .feat-rail-copy-card .feat-copy h2 em {
  color: rgba(255, 255, 255, .35);
}
.feat-rail-copy-card .feat-copy > p {
  font-size: .88rem;
  line-height: 1.75;
  margin-bottom: 1rem;
  color: var(--muted);
}
.feat-rail-copy-card .feat-bullets {
  margin-bottom: 1rem;
  gap: .35rem;
}
.feat-rail-copy-card .feat-bullet {
  font-size: .8rem;
  line-height: 1.5;
  color: rgba(12, 39, 68, .62);
}
[data-theme="dark"] .feat-rail-copy-card .feat-bullet {
  color: rgba(255, 255, 255, .55);
}
.feat-rail-copy-card .feat-link {
  margin-top: .25rem;
}
[data-theme="dark"] .feat-rail-copy-card .feat-copy h2 {
  color: rgba(210, 225, 255, .98);
}
/* Railway line + progress */
.feat-rail-line-wrap {
  max-width: 1220px;
  margin: 0 auto;
  padding: 0 5%;
  width: 100%;
  flex-shrink: 0;
  margin-top: 1.25rem;
}
.feat-rail-line {
  position: relative;
  height: 3px;
  border-radius: 999px;
  background: linear-gradient(90deg,
    rgba(20, 88, 184, .12) 0%,
    rgba(20, 88, 184, .22) 50%,
    rgba(201, 148, 28, .15) 100%);
  overflow: hidden;
}
.feat-rail-line-fill {
  position: absolute;
  inset: 0 auto 0 0;
  width: 100%;
  transform-origin: left center;
  transform: scaleX(calc(0.08 + var(--feat-rail-p, 0) * 0.92));
  background: linear-gradient(90deg, var(--blue), rgba(20, 88, 184, .75), var(--gold));
  border-radius: inherit;
  transition: transform 0.05s linear;
}
.feat-rail-ticks {
  display: flex;
  justify-content: space-between;
  margin-top: .65rem;
  padding: 0 .15rem;
}
.feat-rail-tick {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .35rem;
  flex: 1;
  max-width: 25%;
}
.feat-rail-tick-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(20, 88, 184, .2);
  border: 2px solid rgba(255, 255, 255, .9);
  box-shadow: 0 0 0 1px rgba(20, 88, 184, .15);
  transition: transform .35s cubic-bezier(.22, 1, .36, 1), background .35s, box-shadow .35s;
}
.feat-rail-tick.on .feat-rail-tick-dot {
  background: var(--blue);
  box-shadow: 0 0 0 4px rgba(20, 88, 184, .18);
  transform: scale(1.15);
}
.feat-rail-tick-num {
  font-family: 'DM Mono', monospace;
  font-size: .62rem;
  letter-spacing: .12em;
  color: rgba(12, 39, 68, .38);
  transition: color .3s;
}
.feat-rail-tick.on .feat-rail-tick-num {
  color: var(--blue);
  font-weight: 600;
}
.feat-rail-hint {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: .6rem;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: rgba(12, 39, 68, .32);
  margin-top: .85rem;
}
[data-theme="dark"] .feat-rail-line {
  background: linear-gradient(90deg,
    rgba(74, 130, 220, .15) 0%,
    rgba(74, 130, 220, .28) 50%,
    rgba(201, 148, 28, .2) 100%);
}
[data-theme="dark"] .feat-rail-tick-dot {
  border-color: rgba(18, 28, 42, .95);
  background: rgba(74, 130, 220, .2);
}
[data-theme="dark"] .feat-rail-tick-num { color: rgba(255, 255, 255, .35); }
[data-theme="dark"] .feat-rail-tick.on .feat-rail-tick-num { color: var(--gold); }
[data-theme="dark"] .feat-rail-hint { color: rgba(255, 255, 255, .28); }

/* ══════════════════════════════════════
   DARK METRICS SECTION  (has SVG bg)
══════════════════════════════════════ */
.metrics-section {
  background: var(--navy);
  padding: 6rem 5%; position: relative; overflow: hidden;
}
/* SVG circuit lines background */
.metrics-svg-bg {
  position: absolute; inset: 0; pointer-events: none; z-index: 0; opacity: .12;
}
.metrics-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
.metrics-head {
  display: flex; align-items: flex-end; justify-content: space-between;
  gap: 2rem; margin-bottom: 3.5rem; flex-wrap: wrap;
}
.metrics-h2 {
  font-family: 'Fraunces', serif;
  font-size: clamp(2.2rem, 4vw, 3.2rem);
  font-weight: 900; letter-spacing: -.04em;
  color: var(--white); line-height: 1.05; max-width: 420px;
}
.metrics-h2 em { font-style: italic; color: var(--gold); font-weight: 700; }
.metrics-desc { font-size: .9rem; color: rgba(255,255,255,.4); line-height: 1.7; max-width: 260px; font-weight: 300; }
.metrics-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px; overflow: hidden;
}
.metric-cell {
  padding: 2.2rem 1.8rem;
  border-right: 1px solid rgba(255,255,255,.06);
  transition: background .3s;
}
.metric-cell:last-child { border-right: none; }
.metric-cell:hover { background: rgba(255,255,255,.04); }
.metric-num {
  font-family: 'Fraunces', serif;
  font-size: 3rem; font-weight: 900; letter-spacing: -.04em;
  color: var(--white); line-height: 1; margin-bottom: .3rem;
}
.metric-num b { color: var(--gold); font-weight: 900; }
.metric-label { font-size: .82rem; color: rgba(255,255,255,.35); line-height: 1.55; }

/* ══════════════════════════════════════
   WHO SECTION  (has pattern bg)
══════════════════════════════════════ */
.who-section {
  padding: 6.5rem 5%; background: var(--off);
  position: relative; overflow: hidden;
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.who-pattern {
  position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: .5;
}
.who-inner { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }
.who-head { max-width: 760px; margin-bottom: 3.5rem; }
.who-head .s-sub { max-width: 100%; }
.who-head .s-sub + .s-sub { margin-top: 1rem; }
.who-grid {
  display: grid; grid-template-columns: repeat(5,1fr);
  gap: 1px; background: var(--border);
  border: 1px solid var(--border); border-radius: 14px; overflow: hidden;
}
.who-card {
  background: var(--surface); padding: 2rem 1.6rem;
  transition: background .25s; position: relative;
}
.who-card:hover { background: var(--off2); }
.who-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: var(--gold); transform: scaleX(0);
  transform-origin: left; transition: transform .35s;
}
.who-card:hover::before { transform: scaleX(1); }
.wc-num {
  font-family: 'DM Mono', monospace; font-size: .65rem;
  color: rgba(0,0,0,.18); margin-bottom: .9rem; letter-spacing: .1em;
}
.wc-thumb {
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 1rem;
  background: var(--sand);
  border: 1px solid var(--border);
}
.wc-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center;
  display: block;
}
.wc-icon {
  width: 42px; height: 42px; border-radius: 10px;
  background: var(--sand); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; margin-bottom: 1rem;
}
.wc-title {
  font-family: 'Fraunces', serif; font-size: 1.1rem; font-weight: 700;
  letter-spacing: -.03em; color: var(--ink); margin-bottom: .4rem;
}
.wc-text { font-size: .83rem; color: var(--muted); line-height: 1.65; }
.wc-tag {
  display: inline-flex; align-items: center;
  font-family: 'DM Mono', monospace;
  font-size: .62rem; letter-spacing: .1em; text-transform: uppercase;
  color: var(--blue); margin-top: 1rem;
}

/* ══════════════════════════════════════
   TESTIMONIALS
══════════════════════════════════════ */
.testi-section { padding: 6.5rem 5%; overflow: hidden; }
.testi-inner { max-width: 1100px; margin: 0 auto; }
.testi-head { margin-bottom: 3rem; }
.testi-track-wrap {
  overflow: hidden; position: relative; margin: 0 -5%;
}
.testi-track-wrap::before, .testi-track-wrap::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 120px; z-index: 2;
}
.testi-track-wrap::before { left: 0; background: linear-gradient(90deg, var(--white), transparent); }
.testi-track-wrap::after { right: 0; background: linear-gradient(-90deg, var(--white), transparent); }
.testi-track { display: flex; gap: 1.2rem; width: max-content; animation: scrollLeft 36s linear infinite; padding: 0 5%; }
.testi-track:hover { animation-play-state: paused; }
@keyframes scrollLeft { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.testi-card {
  flex-shrink: 0; width: 320px;
  background: linear-gradient(165deg, rgba(255,255,255,.95) 0%, var(--off) 100%);
  border: 1px solid var(--border);
  border-radius: 18px; padding: 1.65rem 1.5rem;
  transition: border-color .25s ease, box-shadow .35s ease, transform .35s ease;
  box-shadow: 0 8px 32px rgba(6, 26, 51, .05);
}
.testi-card:hover {
  border-color: rgba(20, 88, 184, .2);
  box-shadow: 0 16px 48px rgba(6, 26, 51, .1);
  transform: translateY(-3px);
}
.testi-stars { color: var(--gold); font-size: .8rem; margin-bottom: .9rem; letter-spacing: .05em; }
.testi-txt { font-size: .86rem; color: var(--ink); line-height: 1.7; margin-bottom: 1.2rem; }
.testi-author { display: flex; align-items: center; gap: .65rem; }
.testi-av {
  width: 32px; height: 32px; border-radius: 50%;
  background: linear-gradient(135deg, var(--orange), var(--gold));
  display: flex; align-items: center; justify-content: center;
  font-size: .72rem; font-weight: 800; color: var(--white);
  font-family: 'Plus Jakarta Sans', sans-serif; flex-shrink: 0;
}
.testi-name { font-size: .82rem; font-weight: 700; color: var(--ink); line-height: 1.2; }
.testi-role { font-size: .74rem; color: var(--muted); }

/* ══════════════════════════════════════
   PRICING
══════════════════════════════════════ */
.pricing-section {
  padding: 6.5rem 5%;
  background: var(--off);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
}
.pricing-inner {
  max-width: 1240px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(240px, 1fr) minmax(0, 1.2fr);
  gap: 2.5rem 3.5rem;
  align-items: center;
}
.pricing-left {
  text-align: right;
}
.pricing-left .s-tag {
  display: inline-flex;
  margin-left: auto;
  margin-bottom: 1rem;
}
.pricing-left .s-h2 {
  margin-bottom: 1rem;
}
.pricing-left .s-sub {
  margin-left: auto;
  max-width: 26rem;
  text-align: right;
}
.pricing-right {
  min-width: 0;
  display: flex;
  align-items: center;
  justify-content: stretch;
}
.price-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.25rem;
  width: 100%;
  max-width: none;
}
.p-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem 1.65rem 1.65rem;
  transition: all .3s;
  min-height: 0;
  display: flex;
  flex-direction: column;
}
.p-card:hover { transform: translateY(-4px); box-shadow: 0 20px 50px rgba(0,0,0,.07); }
.p-card.featured {
  background: var(--navy); border-color: var(--navy);
  box-shadow: 0 8px 40px rgba(6, 26, 51, .35);
}
.p-card.featured:hover { box-shadow: 0 24px 60px rgba(6, 26, 51, .45); }
.p-tier {
  font-family: 'DM Mono', monospace; font-size: .68rem;
  letter-spacing: .12em; text-transform: uppercase;
  color: var(--muted); margin-bottom: .9rem;
}
.p-card.featured .p-tier { color: rgba(255,255,255,.35); }
.p-amount {
  font-family: 'Fraunces', serif;
  font-size: clamp(2.35rem, 3.5vw, 3rem);
  font-weight: 900; letter-spacing: -.04em;
  color: var(--ink); line-height: 1; margin-bottom: .25rem;
}
.p-card.featured .p-amount { color: var(--white); }
.p-amount small { font-size: 1rem; font-weight: 400; color: var(--muted); font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: 0; }
.p-card.featured .p-amount small { color: rgba(255,255,255,.35); }
.p-desc {
  font-size: .82rem;
  color: var(--muted);
  line-height: 1.6;
  margin: .75rem 0 1rem;
  padding-bottom: 1rem;
  border-bottom: 1px solid var(--border);
}
.p-card.featured .p-desc { color: rgba(255,255,255,.4); border-color: rgba(255,255,255,.1); }
.p-feats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .4rem .65rem;
  margin-bottom: 1.25rem;
  align-items: start;
}
.p-feat {
  display: flex;
  align-items: flex-start;
  gap: .5rem;
  font-size: .78rem;
  line-height: 1.35;
  color: rgba(13,13,13,.62);
}
.p-card.featured .p-feat { color: rgba(255,255,255,.55); }
.p-feat-dot {
  flex-shrink: 0; width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid rgba(224, 112, 21, .35); background: rgba(224, 112, 21, .1);
  display: flex; align-items: center; justify-content: center;
}
.p-feat-dot::after { content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--gold); }
.p-btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; padding: .78rem; border-radius: 10px;
  font-size: .87rem; font-weight: 700; cursor: pointer; transition: all .25s;
  font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -.01em;
}
.p-btn-ghost { background: var(--off); border: 1px solid var(--border); color: var(--ink); }
.p-btn-ghost:hover { background: var(--sand); border-color: rgba(0,0,0,.12); }
.p-btn-orange { background: linear-gradient(135deg, var(--orange), var(--gold)); color: var(--white); box-shadow: 0 4px 16px rgba(224, 112, 21, .35); }
.p-btn-orange:hover { filter: brightness(1.06); box-shadow: 0 8px 28px rgba(201, 148, 28, .4); transform: translateY(-1px); }

/* ══════════════════════════════════════
   FAQ (dark bg with SVG)
══════════════════════════════════════ */
.faq-section {
  padding: 6.5rem 5%;
  background: var(--navy); position: relative; overflow: hidden;
}
.faq-svg-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; opacity: .06; }
.faq-inner {
  max-width: 1100px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr 1.5fr;
  gap: 5rem; align-items: start; position: relative; z-index: 1;
}
.faq-left .s-tag { color: rgba(201, 148, 28, .95); }
.faq-left h2 {
  font-family: 'Fraunces', serif; font-size: clamp(2rem, 3.5vw, 2.9rem);
  font-weight: 900; letter-spacing: -.04em; color: var(--white); line-height: 1.06; margin-bottom: 1rem;
}
.faq-left h2 em { font-style: italic; color: rgba(255,255,255,.35); font-weight: 700; }
.faq-left p { font-size: .9rem; color: rgba(255,255,255,.4); line-height: 1.7; }
.faq-list { display: flex; flex-direction: column; }
.faq-item { border-bottom: 1px solid rgba(255,255,255,.07); padding: 1.2rem 0; }
.faq-q {
  display: flex; align-items: center; justify-content: space-between; gap: 1rem;
  cursor: pointer; font-size: .9rem; font-weight: 600;
  color: rgba(255,255,255,.7); transition: color .2s;
}
.faq-q:hover { color: var(--white); }
.faq-toggle {
  flex-shrink: 0; width: 26px; height: 26px;
  border: 1px solid rgba(255,255,255,.12); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: rgba(255,255,255,.4); font-size: .95rem; font-weight: 300;
  transition: all .3s; line-height: 1;
}
.faq-item.open .faq-toggle { background: var(--blue); border-color: var(--blue); color: var(--white); transform: rotate(45deg); }
.faq-a { font-size: .88rem; color: rgba(255,255,255,.4); line-height: 1.8; max-height: 0; overflow: hidden; transition: max-height .4s ease, padding .3s; }
.faq-item.open .faq-a { max-height: 240px; padding-top: .85rem; }

/* ══════════════════════════════════════
   CTA
══════════════════════════════════════ */
.cta-section {
  padding: 7rem 5%; text-align: center;
  position: relative; overflow: hidden;
  background: var(--page-bg);
  border-top: 1px solid var(--border);
}
.cta-svg-bg { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.cta-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }
.cta-h2 {
  font-family: 'Fraunces', serif;
  font-size: clamp(2.8rem, 5.5vw, 4.8rem);
  font-weight: 900; letter-spacing: -.04em;
  color: var(--ink); line-height: .98; margin-bottom: 1.2rem;
}
.cta-h2 em { font-style: italic; color: var(--blue); font-weight: 700; }
.cta-sub { font-size: 1.02rem; color: var(--muted); margin-bottom: 2.5rem; line-height: 1.7; }
.cta-inner .cta-sub:first-of-type { margin-bottom: 1.15rem; }
.cta-inner .cta-sub:nth-of-type(2) {
  margin-bottom: 2.5rem;
  font-weight: 600;
  color: var(--ink);
}
[data-theme="dark"] .cta-inner .cta-sub:nth-of-type(2) {
  color: rgba(255, 255, 255, .88);
}

/* ══════════════════════════════════════
   FOOTER
══════════════════════════════════════ */
.footer {
  background: var(--navy); border-top: 1px solid rgba(255,255,255,.06);
  padding: 2rem 5%;
}
.footer-inner {
  max-width: 1100px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 1rem;
}
.f-logo { display: flex; align-items: center; line-height: 0; }
.f-logo-img {
  height: 26px; width: auto; opacity: .55;
  display: block;
  object-fit: contain;
  filter: grayscale(.2);
}
.f-logo:hover .f-logo-img { opacity: .75; }
.f-copy { font-size: .75rem; color: rgba(255,255,255,.2); font-family: 'DM Mono', monospace; }
.f-links { display: flex; gap: 1.5rem; }
.f-links a { font-size: .75rem; color: rgba(255,255,255,.25); cursor: pointer; transition: color .2s; }
.f-links a:hover { color: rgba(255,255,255,.7); }

/* ══════════════════════════════════════
   SCROLL REVEAL
══════════════════════════════════════ */
.r { opacity: 0; transform: translateY(22px); transition: opacity .7s ease, transform .7s ease; }
.r.v { opacity: 1; transform: none; }
.r.d1 { transition-delay: .08s; }
.r.d2 { transition-delay: .16s; }
.r.d3 { transition-delay: .24s; }
.r.d4 { transition-delay: .32s; }
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

/* ══════════════════════════════════════
   MOBILE
══════════════════════════════════════ */
.mob-overlay {
  display: none; position: fixed; inset: 0; z-index: 600;
  background: rgba(255,255,255,.97); backdrop-filter: blur(24px);
  flex-direction: column; align-items: center; justify-content: center; gap: 1.5rem;
}
.mob-overlay.open { display: flex; }
.mob-overlay a { font-family: 'Fraunces', serif; font-size: 2.2rem; font-weight: 900; color: var(--ink); letter-spacing: -.04em; cursor: pointer; transition: color .15s; }
.mob-overlay a:hover { color: var(--blue); }

const { useState, useEffect, useRef } = React;

/* ══ REVEAL ══ */
function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(
      entries => entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('v'); }),
      { threshold: 0.1 }
    );
    document.querySelectorAll('.r').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function useScrollProgress() {
  useEffect(() => {
    const el = document.getElementById('scroll-progress');
    if (!el) return undefined;
    const onScroll = () => {
      const doc = document.documentElement;
      const sh = doc.scrollHeight - doc.clientHeight;
      el.style.width = sh > 0 ? `${(doc.scrollTop / sh) * 100}%` : '0%';
    };
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
}

function useTheme() {
  const [dark, setDark] = useState(() => {
    if (typeof document === 'undefined') return false;
    return document.documentElement.getAttribute('data-theme') === 'dark';
  });
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    try {
      localStorage.setItem('theme', dark ? 'dark' : 'light');
    } catch (e) { /* ignore */ }
  }, [dark]);
  return [dark, setDark];
}

function HeroWorkflowInteractive() {
  const [phase, setPhase] = useState('intro');
  const [imgSrc, setImgSrc] = useState(HERO_WF_IMG);
  const [stepIdx, setStepIdx] = useState(0);
  const [videoProgress, setVideoProgress] = useState(0);
  const videoRef = useRef(null);

  const startVideo = () => {
    setStepIdx(0);
    setVideoProgress(0);
    setPhase('video');
  };

  const seekToStep = (i) => {
    const v = videoRef.current;
    if (!v) return;
    const apply = () => {
      const d = v.duration;
      if (!d || !Number.isFinite(d)) return;
      const t = (i / 4) * d + 0.02;
      v.currentTime = Math.min(t, Math.max(0, d - 0.05));
      setStepIdx(i);
      setVideoProgress(v.currentTime / d);
      v.play().catch(() => {});
    };
    if (v.readyState >= 1) apply();
    else v.addEventListener('loadedmetadata', apply, { once: true });
  };

  useEffect(() => {
    if (phase === 'video') {
      setStepIdx(0);
      setVideoProgress(0);
    } else {
      setVideoProgress(0);
    }
  }, [phase]);

  useEffect(() => {
    if (phase !== 'video' || !videoRef.current) return undefined;
    const v = videoRef.current;
    const onTime = () => {
      const d = v.duration;
      if (!d || !Number.isFinite(d)) return;
      const p = v.currentTime / d;
      setVideoProgress(p);
      let i = 3;
      if (p < 0.25) i = 0;
      else if (p < 0.5) i = 1;
      else if (p < 0.75) i = 2;
      setStepIdx(i);
    };
    v.addEventListener('timeupdate', onTime);
    v.play().catch(() => {});
    return () => v.removeEventListener('timeupdate', onTime);
  }, [phase]);

  const urlBar =
    phase === 'intro'
      ? 'app.bluenest.ai'
      : phase === 'video'
        ? 'workflow · processing'
        : 'app.bluenest.ai/shared/…';

  const statusLabel =
    phase === 'intro' ? 'Ready' : phase === 'video' ? 'Running' : 'Live';

  return (
    <div className="hero-workflow">
      <div className="hero-workflow-main">
        <div className="gif-corner tl"><Corner/></div>
        <div className="gif-corner tr"><Corner/></div>
        <div className="gif-corner bl"><Corner/></div>
        <div className="gif-corner br"><Corner/></div>
        <div className="hero-gif-frame">
          {phase === 'embed' ? (
            <div className="hero-mini-browser hero-mini-browser--embed">
              <div className="gif-topbar">
                <div className="gif-dots">
                  <div className="gif-dot gif-dot-r"/>
                  <div className="gif-dot gif-dot-y"/>
                  <div className="gif-dot gif-dot-g"/>
                </div>
                <div className="gif-urlbar" style={{fontSize: '.58rem', wordBreak: 'break-all', lineHeight: 1.35}}>{HERO_WF_EMBED}</div>
                <div className="gif-status">
                  <div className="gif-status-dot"/>
                  Shared
                </div>
              </div>
              <div className="hero-wf-iframe-wrap">
                <iframe
                  title="BlueNest shared CMA"
                  src={HERO_WF_EMBED}
                  sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-downloads"
                  loading="eager"
                  referrerPolicy="no-referrer-when-downgrade"
                />
              </div>
            </div>
          ) : (
            <>
              <div className="gif-topbar">
                <div className="gif-dots">
                  <div className="gif-dot gif-dot-r"/>
                  <div className="gif-dot gif-dot-y"/>
                  <div className="gif-dot gif-dot-g"/>
                </div>
                <div className="gif-urlbar">{urlBar}</div>
                <div className="gif-status">
                  <div className="gif-status-dot"/>
                  {statusLabel}
                </div>
              </div>
              <div className="gif-media">
                {phase === 'intro' && (
                  <div className="hero-wf-media">
                    <img
                      src={imgSrc}
                      alt="BlueNest — search before workflow"
                      onError={() => setImgSrc(HERO_WF_IMG_FALLBACK)}
                    />
                    <button type="button" className="hero-wf-hit" onClick={startVideo} aria-label="Start workflow: play demo video">
                      <IconSearchHero/>
                      Search
                    </button>
                  </div>
                )}
                {phase === 'video' && (
                  <div className="hero-wf-media">
                    <video
                      ref={videoRef}
                      src={HERO_WF_VIDEO}
                      playsInline
                      controls
                      onEnded={() => setPhase('embed')}
                    />
                  </div>
                )}
              </div>
            </>
          )}
        </div>
      </div>

      <aside className="hero-workflow-side" aria-live="polite">
        {phase === 'intro' && (
          <>
            <p className="hero-wf-side-title">Try the workflow</p>
            <p className="hero-wf-intro-hint">
              Click <strong>Search</strong> in the preview to explore our robust platform — then watch a short walkthrough and open your live CMA.
            </p>
            
          </>
        )}
        {phase === 'video' && (
          <>
            <p className="hero-wf-side-title">What you&apos;re seeing</p>
            <p className="hero-wf-progress-label">Progress · tap a step to jump</p>

              className="hero-wf-progress"

              aria-valuemin={0}
              aria-valuemax={100}
              aria-valuenow={Math.round(videoProgress * 100)}

            >

            <ol className="hero-wf-steps" role="list">
              {HERO_WF_STEPS.map((s, i) => (
                <li key={s.title} role="none">
                  <button

                    className={`hero-wf-step${stepIdx === i ? ' active' : ''}`}

                    </div>
                  </button>
                </li>
              ))}
            </ol>

        )}

        )}

    </div>
  );

function FeatureRail({ features }) {
  const spacerRef = useRef(null);
  const viewportRef = useRef(null);
  const targetRef = useRef(0);
  const smoothRef = useRef(0);
  const rafRef = useRef(null);
  const activeRef = useRef(0);

  const panels = features.flatMap((f) => [
    { kind: 'media', key: `${f.index}-m`, feature: f },
    { kind: 'copy', key: `${f.index}-c`, feature: f },
  ]);
  const pairCount = features.length;

  useEffect(() => {
    const el = spacerRef.current;
    if (!el) return undefined;

    const mqReduce = window.matchMedia('(prefers-reduced-motion: reduce)');
    const mqMob = window.matchMedia('(max-width: 960px)');

    const isStatic = () => mqReduce.matches || mqMob.matches;

    const updateRailVw = () => {
      const vp = viewportRef.current;
      if (vp && el) {
        el.style.setProperty('--rail-vw', `${vp.clientWidth}px`);
      }
    };

    const setProgress = (p) => {
      updateRailVw();
      el.style.setProperty('--feat-rail-p', String(p));
      const idx = Math.min(pairCount - 1, Math.max(0, Math.round(p * (pairCount - 1))));
      if (activeRef.current !== idx) {
        activeRef.current = idx;
        el.querySelectorAll('[data-feat-tick]').forEach((node, i) => {
          node.classList.toggle('on', i === idx);
        });
      }
    };

    const tick = () => {
      rafRef.current = null;
      if (isStatic()) return;
      const target = targetRef.current;
      const s = smoothRef.current;
      const next = s + (target - s) * 0.11;
      smoothRef.current = next;
      setProgress(next);
      if (Math.abs(target - next) > 0.0035) {
        rafRef.current = requestAnimationFrame(tick);
      } else {
        smoothRef.current = target;
        setProgress(target);
      }
    };

    const computeTarget = () => {
      if (isStatic()) return;
      const start = el.offsetTop;
      const range = el.offsetHeight - window.innerHeight;
      let raw;
      if (range <= 0) {
        raw = window.scrollY >= start ? 1 : 0;
      } else {
        raw = (window.scrollY - start) / range;
      }
      targetRef.current = Math.min(1, Math.max(0, raw));
    };

    const onScroll = () => {
      if (isStatic()) return;
      computeTarget();
      if (!rafRef.current) rafRef.current = requestAnimationFrame(tick);
    };

    const onResize = () => {
      updateRailVw();
      computeTarget();
      if (!isStatic()) {
        smoothRef.current = targetRef.current;
        setProgress(targetRef.current);
      }
    };

    const sync = () => {
      if (isStatic()) {
        el.style.setProperty('--feat-rail-p', '0');
        smoothRef.current = 0;
        targetRef.current = 0;
        return;
      }
      updateRailVw();
      computeTarget();
      smoothRef.current = targetRef.current;
      setProgress(targetRef.current);
    };

    let ro;
    if (viewportRef.current) {
      ro = new ResizeObserver(() => {
        updateRailVw();
        computeTarget();
        if (!isStatic()) {
          smoothRef.current = targetRef.current;
          setProgress(targetRef.current);
        }
      });
      ro.observe(viewportRef.current);
    }

    mqReduce.addEventListener('change', sync);
    mqMob.addEventListener('change', sync);
    window.addEventListener('scroll', onScroll, { passive: true });
    window.addEventListener('resize', onResize, { passive: true });
    sync();

    return () => {
      if (ro) ro.disconnect();
      mqReduce.removeEventListener('change', sync);
      mqMob.removeEventListener('change', sync);
      window.removeEventListener('scroll', onScroll);
      window.removeEventListener('resize', onResize);
      if (rafRef.current) cancelAnimationFrame(rafRef.current);
    };
  }, [pairCount]);

  return (
    <section
      className="feat-rail-spacer"
      id="features"
      ref={spacerRef}
      aria-label="Product capabilities"
      style={{ '--rail-panels': panels.length, '--rail-pairs': pairCount }}
    >
      <div className="feat-rail-sticky">
        <div className="feat-rail-head">
          <p className="feat-rail-kicker">Capabilities</p>
          <p className="feat-rail-title">
            Workflow in Motion
          </p>
        </div>
        <div className="feat-rail-viewport" ref={viewportRef}>
          <div className="feat-rail-track">
            {panels.map(({ kind, key, feature: f }) => (
              <div
                key={key}
                className={`feat-rail-panel feat-rail-panel--${kind}`}
              >
                {kind === 'media'
                  ? <FeatureRailMediaPanel tag={f.tag} icon={f.icon} gifSrc={f.gifSrc} mediaLabel={f.mediaLabel}/>
                  : <FeatureRailCopyPanel tag={f.tag} title={f.title} desc={f.desc} bullets={f.bullets} linkLabel={f.linkLabel} index={f.index}/>
                }
              </div>
            ))}
          </div>
        </div>
        <div className="feat-rail-line-wrap" aria-hidden="true">
          <div className="feat-rail-line">
            <div className="feat-rail-line-fill" />
          </div>
          <div className="feat-rail-ticks">
            {features.map((f, i) => (
              <div key={f.index || i} className={`feat-rail-tick${i === 0 ? ' on' : ''}`} data-feat-tick>
                <span className="feat-rail-tick-dot" />
                <span className="feat-rail-tick-num">{f.index}</span>
              </div>
            ))}
          </div>
          <p className="feat-rail-hint">Scroll · 4 pairs · 8 panels</p>
        </div>
      </div>
    </section>
  );
}

        'If I renovate, how much could my property be worth?',
        'How does my home compare to others in the building or neighborhood?',
        'What are the key factors driving value in this area?',
      ],
      linkLabel: 'Agent Blue',
      icon: '🤖', mediaLabel: 'agent.png', gifSrc: 'agent.png', reversed: true,
    },
  ];

  return (
    <>
      <Navbar setMob={setMob} dark={dark} onToggleTheme={() => setDark(d => !d)}/>
      <MobileNav open={mob} onClose={() => setMob(false)} dark={dark} onToggleTheme={() => setDark(d => !d)}/>
      <Hero/>
      <Who/>
      <Logos/>
      <Metrics/>
      <FeatureRail features={features}/>
      <Testimonials/>
      <Pricing/>
      <FAQ/>
      <CTAStrip/>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
